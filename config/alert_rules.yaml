alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 800 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95

  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate

  - name: cost_spike
    severity: P2
    condition: cost_per_request_usd > 0.003 for 5m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-spike

  - name: low_quality
    severity: P3
    condition: quality_score_avg < 0.8 for 10m
    type: symptom-based
    owner: ml-owner
    runbook: docs/alerts.md#4-low-quality